<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Riddle Generator</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8f9fa;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
    }

    .hero {
      background: linear-gradient(135deg, #0d6efd, #5a8dee);
      color: white;
      padding: 80px 0;
      text-align: center;
    }

    .section {
      padding: 100px 0;
    }

    .app-box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      max-width: 600px;
      margin: auto;
      text-align: center;
    }

    .riddle {
      font-size: 1.3rem;
      margin-bottom: 25px;
    }

    .answer {
      font-weight: bold;
      color: #0d6efd;
      margin-top: 20px;
      font-size: 1.2rem;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4" href="index.html">Maxwell Richards</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="resume.html">Resume</a></li>
        <li class="nav-item"><a class="nav-link" href="scratch.html">Scratch</a></li>
        <li class="nav-item"><a class="nav-link" href="app.html">Web App</a></li>
        <li class="nav-item"><a class="nav-link" href="links.html">Links</a></li>
      </ul>
    </div>
  </div>
</nav>

<main>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <h1 class="fw-bold">Riddle Generator</h1>
    <p>Click the button to get a random riddle</p>
  </div>
</section>

<!-- APP -->
<section class="section">
  <div class="container">

    <div class="app-box">

      <p class="riddle" id="riddleText">Click the button to start!</p>

      <div class="d-flex justify-content-center gap-3 flex-wrap">
        <button class="btn btn-primary btn-lg" onclick="newRiddle()">
          New Riddle
        </button>

        <button class="btn btn-outline-secondary btn-lg" onclick="showAnswer()">
          Show Answer
        </button>
      </div>

      <p class="answer" id="answerText"></p>

    </div>

  </div>
</section>

</main>

<!-- NAV BUTTONS (NOW RIGHT ABOVE FOOTER) -->
<section class="bg-light py-5">
  <div class="container text-center">

    <h4 class="mb-4">Explore More</h4>

    <a href="index.html" class="btn btn-primary btn-lg m-2">
      <i class="bi bi-house"></i> Home
    </a>

    <a href="resume.html" class="btn btn-outline-primary btn-lg m-2">
      <i class="bi bi-file-earmark-text"></i> Resume
    </a>

    <a href="scratch.html" class="btn btn-outline-primary btn-lg m-2">
      <i class="bi bi-code-slash"></i> Scratch Page
    </a>

  </div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3">
  <p>© 2026 Maxwell Richards</p>
</footer>

<!-- JS -->
<script>
  const riddles = [
    { question: "What has keys but can't open locks?", answer: "A piano" },
    { question: "What has a head, a tail, but no body?", answer: "A coin" },
    { question: "What gets wetter the more it dries?", answer: "A towel" },
    { question: "I speak without a mouth and hear without ears. What am I?", answer: "An echo" },
    { question: "What can travel around the world while staying in one spot?", answer: "A stamp" },
    { question: "What has hands but can’t clap?", answer: "A clock" },
    { question: "The more you take, the more you leave behind. What are they?", answer: "Footsteps" },
    { question: "What has one eye but can’t see?", answer: "A needle" },
    { question: "What is always in front of you but can’t be seen?", answer: "The future" },
    { question: "What has a neck but no head?", answer: "A bottle" }
  ];

  let currentRiddle = null;

  function newRiddle() {
    const randomIndex = Math.floor(Math.random() * riddles.length);
    currentRiddle = riddles[randomIndex];

    document.getElementById("riddleText").innerText = currentRiddle.question;
    document.getElementById("answerText").innerText = "";
  }

  function showAnswer() {
    if (currentRiddle) {
      document.getElementById("answerText").innerText = currentRiddle.answer;
    } else {
      document.getElementById("answerText").innerText = "Click 'New Riddle' first!";
    }
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
