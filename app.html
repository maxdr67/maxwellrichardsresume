<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Riddle Generator</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8f9fa;
      text-align: center;
    }

    .hero {
      background: linear-gradient(135deg, #0d6efd, #5a8dee);
      color: white;
      padding: 80px 0;
    }

    .section {
      padding: 80px 0;
    }

    .app-box {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      max-width: 600px;
      margin: auto;
      margin-bottom: 80px;
    }

    .riddle {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }

    .answer {
      font-weight: bold;
      color: #0d6efd;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">Maxwell Richards</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="resume.html">Resume</a></li>
        <li class="nav-item"><a class="nav-link" href="scratch.html">Scratch</a></li>
        <li class="nav-item"><a class="nav-link active" href="app.html">Web App</a></li>
        <li class="nav-item"><a class="nav-link" href="links.html">Links</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <h1 class="fw-bold">Riddle Generator</h1>
    <p>Click the button to get a random riddle</p>
  </div>
</section>

<!-- APP -->
<section class="section">
  <div class="container">

    <div class="app-box">

      <p class="riddle" id="riddleText">Click the button to start!</p>

      <button class="btn btn-primary btn-lg" onclick="newRiddle()">
        New Riddle
      </button>

      <br><br>

      <button class="btn btn-outline-secondary" onclick="showAnswer()">
        Show Answer
      </button>

      <p class="answer" id="answerText"></p>

    </div>

  </div>
</section>

<!-- NAV BUTTONS -->
<section class="section bg-light">
  <div class="container">

    <h4 class="mb-4">Explore More</h4>

    <a href="index.html" class="btn btn-primary btn-lg m-2">
      <i class="bi bi-house"></i> Home
    </a>

    <a href="resume.html" class="btn btn-outline-primary btn-lg m-2">
      <i class="bi bi-file-earmark-text"></i> Resume
    </a>

    <a href="scratch.html" class="btn btn-outline-primary btn-lg m-2">
      <i class="bi bi-code-slash"></i> Scratch Page
    </a>

  </div>
</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3">
  <p>© 2026 Maxwell Richards</p>
</footer>

<!-- JS -->
<script>
  const riddles = [
    {
      question: "What has keys but can't open locks?",
      answer: "A piano"
    },
    {
      question: "What has a head, a tail, but no body?",
      answer: "A coin"
    },
    {
      question: "What gets wetter the more it dries?",
      answer: "A towel"
    },
    {
      question: "I speak without a mouth and hear without ears. What am I?",
      answer: "An echo"
    },
    {
      question: "What can travel around the world while staying in one spot?",
      answer: "A stamp"
    }
  ];

  let currentRiddle = null;

  function newRiddle() {
    const randomIndex = Math.floor(Math.random() * riddles.length);
    currentRiddle = riddles[randomIndex];

    document.getElementById("riddleText").innerText = currentRiddle.question;
    document.getElementById("answerText").innerText = "";
  }

  function showAnswer() {
    if (currentRiddle) {
      document.getElementById("answerText").innerText = currentRiddle.answer;
    } else {
      document.getElementById("answerText").innerText = "Click 'New Riddle' first!";
    }
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
